services:
  svelte-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migration-toolkit-svelte-ui
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - migration-toolkit-svelte-ui
